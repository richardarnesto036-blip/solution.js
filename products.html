<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>M.R Collection - Products</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Our Products</h1>
        <nav>
            <ul>
                <li><a href="landing.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <div class="products-layout">
        <aside>
            <h2>Filter Products</h2>
            <form>
                <fieldset>
                    <legend>Category</legend>
                    <label><input type="checkbox" name="category"> Foundation</label><br>
                    <label><input type="checkbox" name="category"> Eye shadow</label><br>
                    <label><input type="checkbox" name="category"> Concealer</label>
                </fieldset>
                <button type="submit">Apply Filters</button>
            </form>
        </aside>

        <main>
            <h2>Product List</h2>
            <div class="product-grid"> <article>
                    <img src="lipstick.jpg" alt="Lipstick">
                    <h3>Lipstick and Gloss</h3>
                    <p class="price">120</p>
                    <a href="detail.html" class="btn">View Details</a>
                </article>
                <article>
                    <img src="foundation.jpg" alt="Foundation">
                    <h3>Foundation</h3>
                    <p class="price">200</p>
                    <a href="detail.html" class="btn">View Details</a>
                </article>
                <article>
                    <img src="eyeshadow.jpg" alt="Eye Shadow">
                    <h3>Eye Shadow</h3>
                    <p class="price">50</p>
                    <a href="detail.html" class="btn">View Details</a>
                </article>
                <article>
                    <img src="concealer.jpg" alt="Concealer">
                    <h3>Concealer</h3>
                    <p class="price">45</p>
                    <a href="detail.html" class="btn">View Details</a>
                </article>
            </div>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 M.R COLLECTION</p>
    </footer>
</body>
</html>
